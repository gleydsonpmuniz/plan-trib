# ─────────────── Bibliotecas Python para Parsing ───────────────
libs_referencia:
  python_sped:
    repo: "https://github.com/sped-br/python-sped"
    descricao: "Lib Python com leiautes pré-definidos dos SPEDs"
    status: "Mantida pela comunidade — verificar última atualização"
  sped_extractor:
    pypi: "https://pypi.org/project/sped-extractor/"
    descricao: "Extrai leiautes oficiais (PDFs RFB) → CSV/JSON"
    uso: "Regenerar registries quando RFB publica nova versão"
