    - { faixa: 6, receita_min: 3600000.01,  receita_max: 4800000.00,  aliquota_nominal: 0.3000, parcela_deduzir: 720000.00 }

# ─────────────────────────────── ANEXO III ───────────────────────────────
# Serviços (locação de bens móveis, agências, etc.) e serviços com Fator R >= 28%

