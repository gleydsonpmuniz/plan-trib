# Tabelas dos Anexos do Simples Nacional
# Base legal: LC 123/2006 alterada pela LC 155/2016 (vigência desde 01/01/2018)
# Fonte oficial: http://www.planalto.gov.br/ccivil_03/leis/lcp/lcp123.htm
# MCP Validated: 2026-04-28

metadata:
  source: "Lei Complementar 155/2016 (alterações na LC 123/2006)"
  vigencia_inicio: "2018-01-01"
  ultima_revisao: "2026-04-28"
  observacao: |
    Os valores de Receita Bruta de cada faixa (em R$) e as alíquotas nominais
    e parcelas a deduzir (PD) estão vigentes desde 2018. A Reforma Tributária
    (LC 214/2025) prevê transição gradual, mas o Simples Nacional permanece
    com tabelas próprias na fase inicial.

# ─────────────────────────────── ANEXO I ───────────────────────────────
# Comércio (revenda de mercadorias)
# Tributos incluídos: IRPJ, CSLL, COFINS, PIS, INSS/CPP, ICMS

