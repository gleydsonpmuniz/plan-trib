    - { faixa: 3, receita_min: 360000.01,   receita_max: 720000.00,   aliquota_nominal: 0.1350, parcela_deduzir: 17640.00 }
    - { faixa: 4, receita_min: 720000.01,   receita_max: 1800000.00,  aliquota_nominal: 0.1600, parcela_deduzir: 35640.00 }
    - { faixa: 5, receita_min: 1800000.01,  receita_max: 3600000.00,  aliquota_nominal: 0.2100, parcela_deduzir: 125640.00 }
    - { faixa: 6, receita_min: 3600000.01,  receita_max: 4800000.00,  aliquota_nominal: 0.3300, parcela_deduzir: 648000.00 }

# ─────────────────────────────── ANEXO IV ───────────────────────────────
# Serviços com cessão de mão de obra; INSS recolhido por fora do DAS

anexo_IV:
  descricao: "Serviços de construção, vigilância, limpeza, conservação"
  observacao: "INSS Patronal NÃO incluso no DAS — recolhe à parte (20% + RAT + terceiros)"
  atividades_exemplo:
    - "Construção de imóveis e obras de engenharia"
    - "Vigilância, limpeza e conservação"
    - "Serviços advocatícios"
  faixas:
    - { faixa: 1, receita_min: 0.00,        receita_max: 180000.00,   aliquota_nominal: 0.0450, parcela_deduzir: 0.00 }
    - { faixa: 2, receita_min: 180000.01,   receita_max: 360000.00,   aliquota_nominal: 0.0900, parcela_deduzir: 8100.00 }
    - { faixa: 3, receita_min: 360000.01,   receita_max: 720000.00,   aliquota_nominal: 0.1020, parcela_deduzir: 12420.00 }
    - { faixa: 4, receita_min: 720000.01,   receita_max: 1800000.00,  aliquota_nominal: 0.1400, parcela_deduzir: 39780.00 }
    - { faixa: 5, receita_min: 1800000.01,  receita_max: 3600000.00,  aliquota_nominal: 0.2200, parcela_deduzir: 183780.00 }
    - { faixa: 6, receita_min: 3600000.01,  receita_max: 4800000.00,  aliquota_nominal: 0.3300, parcela_deduzir: 828000.00 }

# ─────────────────────────────── ANEXO V ───────────────────────────────
# Serviços com Fator R < 28% (alíquotas mais altas)

anexo_V:
  descricao: "Serviços com Fator R < 28%"
  atividades_exemplo:
    - "Engenharia, arquitetura, medicina, odontologia (quando Fator R < 28%)"
    - "Auditoria, consultoria, jornalismo (Fator R < 28%)"
  faixas:
    - { faixa: 1, receita_min: 0.00,        receita_max: 180000.00,   aliquota_nominal: 0.1550, parcela_deduzir: 0.00 }
    - { faixa: 2, receita_min: 180000.01,   receita_max: 360000.00,   aliquota_nominal: 0.1800, parcela_deduzir: 4500.00 }
    - { faixa: 3, receita_min: 360000.01,   receita_max: 720000.00,   aliquota_nominal: 0.1950, parcela_deduzir: 9900.00 }
    - { faixa: 4, receita_min: 720000.01,   receita_max: 1800000.00,  aliquota_nominal: 0.2050, parcela_deduzir: 17100.00 }
    - { faixa: 5, receita_min: 1800000.01,  receita_max: 3600000.00,  aliquota_nominal: 0.2300, parcela_deduzir: 62100.00 }
    - { faixa: 6, receita_min: 3600000.01,  receita_max: 4800000.00,  aliquota_nominal: 0.3050, parcela_deduzir: 540000.00 }

# ─────────────────────────────── FATOR R ───────────────────────────────
fator_r:
  formula: "(folha_12m + pro_labore_12m) / receita_bruta_12m"
  threshold: 0.28
  resultado_se_maior_ou_igual: "anexo_III"
  resultado_se_menor: "anexo_V"

# ─────────────────────────────── SUBLIMITES ───────────────────────────────
sublimites:
  federal:
    valor: 4800000.00
    consequencia: "Exclusão do Simples"
  estadual_icms_iss:
    valor: 3600000.00
    consequencia: "Recolhe ICMS/ISS por fora; demais tributos seguem no DAS"
