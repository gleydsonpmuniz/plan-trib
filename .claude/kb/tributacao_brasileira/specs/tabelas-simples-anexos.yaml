  descricao: "Comércio (revenda)"
  atividades_exemplo:
    - "Revenda de mercadorias, exceto para o exterior"
  faixas:
    - faixa: 1
      receita_min: 0.00
      receita_max: 180000.00
      aliquota_nominal: 0.0400
      parcela_deduzir: 0.00
    - faixa: 2
      receita_min: 180000.01
      receita_max: 360000.00
      aliquota_nominal: 0.0730
      parcela_deduzir: 5940.00
    - faixa: 3
      receita_min: 360000.01
      receita_max: 720000.00
      aliquota_nominal: 0.0950
      parcela_deduzir: 13860.00
    - faixa: 4
      receita_min: 720000.01
      receita_max: 1800000.00
      aliquota_nominal: 0.1070
      parcela_deduzir: 22500.00
    - faixa: 5
      receita_min: 1800000.01
      receita_max: 3600000.00
      aliquota_nominal: 0.1430
      parcela_deduzir: 87300.00
    - faixa: 6
      receita_min: 3600000.01
      receita_max: 4800000.00
      aliquota_nominal: 0.1900
      parcela_deduzir: 378000.00
  reparticao_por_faixa:
    # % de cada tributo dentro do total da alíquota efetiva
    # Faixa 1 (exemplo)
    1: { irpj: 0.055, csll: 0.035, cofins: 0.1274, pis: 0.0276, cpp: 0.415, icms: 0.34 }
    2: { irpj: 0.055, csll: 0.035, cofins: 0.1274, pis: 0.0276, cpp: 0.415, icms: 0.34 }
    3: { irpj: 0.055, csll: 0.035, cofins: 0.1274, pis: 0.0276, cpp: 0.415, icms: 0.335 }
    4: { irpj: 0.055, csll: 0.035, cofins: 0.1274, pis: 0.0276, cpp: 0.42,  icms: 0.335 }
    5: { irpj: 0.055, csll: 0.035, cofins: 0.1274, pis: 0.0276, cpp: 0.42,  icms: 0.335 }
    6: { irpj: 0.135, csll: 0.10,  cofins: 0.2895, pis: 0.0625, cpp: 0.4250, icms: null }
    # Faixa 6: sem ICMS no DAS (sublimite ultrapassado)

# ─────────────────────────────── ANEXO II ───────────────────────────────
# Indústria (venda de mercadorias industrializadas pelo contribuinte)
# Tributos incluídos: I + IPI

