name: Build & Push Images
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [backend, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.target }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plan-trib-${{ matrix.target }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/plan-trib-${{ matrix.target }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
